<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Art Gallery</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    header {
      text-align: center;
      padding: 40px;
      background: black;
      color: white;
    }

    h1 {
      margin: 0;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 40px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .about {
      padding: 40px;
      text-align: center;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: black;
      color: white;
    }
  </style>
</head>

<body>

<header>
  <h1>My Art Gallery</h1>
  <p>Expressing emotions through art 🎨</p>
</header>

<section class="gallery">
  <div class="card">
    <img src="art1.jpg" alt="Art 1">
    <h3>Portrait Sketch</h3>
    <p>Pencil drawing</p>
  </div>

  <div class="card">
    <img src="art2.jpg" alt="Art 2">
    <h3>Nature Painting</h3>
    <p>Watercolor</p>
  </div>
</section>

<section class="about">
  <h2>About Me</h2>
  <p>I am passionate about creating art that tells a story.</p>
</section>

<footer>
  <p>Contact: your@email.com</p>
</footer>

</body>
</html>
